# בוט הבדיקות (E2E) — בודק שהאתר החי בריא: נטען, בלי דפים לבנים ובלי קריסות.
#
# חשוב: הבוט *לא* רץ על push, אלא רק בלוח זמנים ובלחיצת כפתור. כך הוא לעולם
# לא חוסם פריסה ל-Railway (שממתינה ל-CI הרגיל), והוא בודק את הגרסה שכבר באוויר.
#
# דורש שני "סודות" בהגדרות הריפו (Settings → Secrets → Actions):
#   E2E_USER, E2E_PASSWORD — פרטי חשבון-הבדיקה. עד שיוגדרו, הריצה מדולגת בעדינות.

name: E2E bot

on:
  workflow_dispatch: {} # כפתור "Run workflow" להרצה ידנית מתי שרוצים
  schedule:
    - cron: "0 */6 * * *" # אוטומטית כל 6 שעות

jobs:
  # שער בטיחות: אם הסודות עדיין לא הוגדרו — מדלגים בלי להיכשל באדום
  guard:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          E2E_USER: ${{ secrets.E2E_USER }}
        run: |
          if [ -n "$E2E_USER" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::הסודות E2E_USER/E2E_PASSWORD עדיין לא הוגדרו — מדלגים."
          fi

  e2e:
    needs: guard
    if: needs.guard.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run the bot
        env:
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: npm run e2e

      - name: Upload report (screenshots of any failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
